name: Primuse
options:
  bundleIdPrefix: com.welape
  deploymentTarget:
    iOS: "26.1"
  xcodeVersion: "16.0"
  defaultConfig: Debug
  groupSortPosition: top
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: "2U97K3U27A"
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_ALLOW_ENTITLEMENTS_MODIFICATION: YES

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift.git
    from: "7.0.0"
  AMSMB2:
    url: https://github.com/amosavian/AMSMB2.git
    from: "4.0.0"
  FilesProvider:
    url: https://github.com/amosavian/FileProvider.git
    from: "0.26.0"
  Citadel:
    url: https://github.com/orlandos-nl/Citadel.git
    revision: 69d80d39ca3b0bac5f04551a97af5dd7a827f887
  SwiftCrypto:
    url: https://github.com/apple/swift-crypto.git
    from: "3.12.3"
  SwiftNIO:
    url: https://github.com/apple/swift-nio.git
    from: "2.74.0"
  NFSKit:
    url: https://github.com/alexiscn/NFSKit.git
    revision: ec63d055b9ee08d609d3c6cb32f42c07edc7bdf7

schemes:
  Primuse:
    build:
      targets:
        Primuse: all
        PrimuseKit: all
        PrimuseWidgetExtension: all
        PrimuseActivityExtension: all
    run:
      config: Debug
    archive:
      config: Release

targets:
  Primuse:
    type: application
    platform: iOS
    sources:
      - path: Primuse
        excludes:
          - "**/.DS_Store"
    resources:
      - path: Primuse/Resources
    dependencies:
      - package: GRDB
      - package: AMSMB2
        embed: true
      - package: FilesProvider
        product: FilesProvider
      - package: Citadel
        product: Citadel
      - package: SwiftCrypto
        product: Crypto
      - package: SwiftNIO
        product: NIOCore
      - package: NFSKit
        product: NFSKit
      - sdk: AppIntents.framework
      - target: PrimuseKit
      - target: PrimuseWidgetExtension
      - target: PrimuseActivityExtension
    info:
      path: Primuse/Info.plist
      properties:
        UIBackgroundModes:
          - audio
        NSSupportsLiveActivities: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        CFBundleDisplayName: "猿音"
        CFBundleName: "Primuse"
        LSApplicationCategoryType: "public.app-category.music"
        UILaunchScreen: {}
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
          NSAllowsLocalNetworking: true
          NSExceptionDomains:
            source-b.invalid:
              NSIncludesSubdomains: true
              NSExceptionAllowsInsecureHTTPLoads: true
              NSExceptionRequiresForwardSecrecy: false
              NSExceptionMinimumTLSVersion: TLSv1.0
            myqcloud.com:
              NSIncludesSubdomains: true
              NSExceptionAllowsInsecureHTTPLoads: true
              NSExceptionRequiresForwardSecrecy: false
              NSExceptionMinimumTLSVersion: TLSv1.0
        NSLocalNetworkUsageDescription: "猿音需要访问本地网络以发现和连接您的 NAS 设备、媒体服务器及其他音乐源。"
        NSBonjourServices:
          - "_smb._tcp."
          - "_webdav._tcp."
          - "_webdavs._tcp."
          - "_ftp._tcp."
          - "_sftp-ssh._tcp."
          - "_nfs._tcp."
          - "_diskstation._tcp."
          - "_synology-dsm._tcp."
          - "_http._tcp."
          - "_https._tcp."
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_EMIT_LOC_STRINGS: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.welape.primuse
        CODE_SIGN_ENTITLEMENTS: Config/Primuse.entitlements

  PrimuseKit:
    type: framework
    platform: iOS
    sources:
      - path: PrimuseKit/Sources/PrimuseKit
    dependencies:
      - package: GRDB
      - sdk: AppIntents.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.welape.primuse.kit
        GENERATE_INFOPLIST_FILE: YES
        SKIP_INSTALL: YES

  PrimuseWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: PrimuseWidgetExtension
    dependencies:
      - target: PrimuseKit
      - package: GRDB
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework
    info:
      path: PrimuseWidgetExtension/Info.plist
      properties:
        CFBundleDisplayName: "猿音小组件"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.welape.primuse.widget
        SKIP_INSTALL: YES
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_ENTITLEMENTS: Config/PrimuseWidgetExtension.entitlements

  PrimuseActivityExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: PrimuseActivityExtension
    dependencies:
      - target: PrimuseKit
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework
      - sdk: ActivityKit.framework
    info:
      path: PrimuseActivityExtension/Info.plist
      properties:
        CFBundleDisplayName: "猿音实时活动"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
        NSSupportsLiveActivities: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.welape.primuse.activity
        SKIP_INSTALL: YES
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_ENTITLEMENTS: Config/PrimuseActivityExtension.entitlements
